# WriteLens Comprehensive Feedback Templates
# Extended version with Help-Seeking Variants
# Includes 50+ distinct feedback variants for adaptive delivery
# Evidence-Centered Design aligned
# Reference: Hattie & Timperley (2007), Nicol & Macfarlane-Dick (2006), Newman & Schwager (1995)

metadata:
  version: "3.0"
  description: "Comprehensive feedback templates with help-seeking integration"
  theoretical_basis: "Adaptive feedback with metacognitive scaffolding for SRL"
  help_seeking_levels: "None, Present, Adaptive"
  cognitive_demand_levels: "Low, Moderate, High"
  delivery_modes: "Written Feedback, Dialogue, Modeled Solution, Guided Practice"

# ============================================================================
# SECTION 1: PLANNING & FORETHOUGHT PHASE FEEDBACK
# ============================================================================

planning_scaffolds:
  
  # Variant 1: No Help-Seeking
  no_planning_none_seeking: >
    Your paragraph needs stronger planning before drafting.
    STEP 1: Reread the rubric and write down the three most important criteria.
    STEP 2: Outline your paragraph (topic sentence + 1-2 supporting points).
    STEP 3: Estimate word count needed for each part.
    Try this planning process now, and then draft. Your quality will improve noticeably.
  
  # Variant 2: Help-Seeking Present
  no_planning_help_seeking_present: >
    I notice you asked for help, which is good! But planning must come first.
    You asked about [TOPIC], yet you hadn't checked the rubric criteria yet.
    HERE IS WHAT TO DO NEXT:
    1. FIRST: Reread the rubric and note the top 3 criteria.
    2. SECOND: Write a brief outline (3-5 bullet points).
    3. THEN: Ask me about [TOPIC] again – I'll help more effectively with the outline in front of us.
    Planning BEFORE asking for help makes the help much more useful. Ready?
  
  # Variant 3: Help-Seeking Adaptive
  no_planning_help_seeking_adaptive: >
    Excellent! You asked for help AND you outlined your paragraph first.
    This is strategic help-seeking – you're learning to self-regulate.
    Your outline shows you understand the task structure.
    Now let's strengthen your outline:
    - Your point #1 is clear, but point #2 needs one specific example.
    - Add a brief note about which evidence you'll use.
    - Then draft paragraph with confidence.
    This planning process (outline before draft) is what strong writers do consistently.

# ============================================================================
# SECTION 2: ARGUMENT DEVELOPMENT FEEDBACK
# ============================================================================

argumentation_feedback:
  
  # NO HELP-SEEKING VARIANTS
  weak_argument_none_seeking_low_demand: >
    Your paragraph introduces an idea, but the argument needs development.
    Your claim: "[CLAIM FROM TEXT]"
    WHAT'S MISSING: A specific example or piece of evidence that supports this claim.
    TRY THIS: Add ONE sentence with a concrete example or fact that proves your claim.
    EXAMPLE TEMPLATE: "For instance, [INSERT SPECIFIC EXAMPLE]. This shows that [EXPLAIN HOW IT SUPPORTS YOUR CLAIM]."
  
  weak_argument_none_seeking_moderate_demand: >
    Your argument structure is beginning to develop, but connections are unclear.
    You state a claim, provide some support, but don't explicitly link evidence to the claim.
    READ YOUR OWN TEXT: Does a reader understand WHY the evidence proves your claim?
    YOUR TASK: Add an explanation sentence after your evidence.
    TEMPLATE: "This is significant because..."  OR  "This demonstrates that..."
  
  weak_argument_none_seeking_high_demand: >
    Your argument includes a claim, evidence, and some explanation.
    However, alternative perspectives are not addressed.
    Strong academic writing considers counterarguments.
    YOUR NEXT LEVEL: Add one sentence that acknowledges a different perspective, then explain why your position is stronger.
    TEMPLATE: "Some might argue [COUNTERPOINT], but [YOUR REASONING] is more compelling because..."
  
  # HELP-SEEKING PRESENT VARIANTS
  weak_argument_help_seeking_present_stage1: >
    I see you asked about your argument structure. That's good – you recognized it needed work!
    But I notice your question was vague: "[HELP REQUEST]"
    Before I suggest changes, help me help you:
    - What specific part of your paragraph feels weakest?
    - Is it the main idea, the evidence, or how they connect?
    Point out the exact sentence, and we'll work on it together.
    This targeted approach helps more than general advice.
  
  weak_argument_help_seeking_present_stage2: >
    You asked for help with your argument, and you've provided context.
    Here's what I see: Your claim is clear, but the evidence doesn't directly support it.
    WHAT TO DO: Revise your evidence to be more specific, OR change your claim to match your evidence.
    REVISION TASK: Make ONE of these changes, then resubmit just that paragraph for feedback.
    I'll confirm it's stronger before you revise the rest.
  
  # ADAPTIVE HELP-SEEKING VARIANTS
  weak_argument_adaptive_seeking_advanced: >
    Excellent approach! You identified your weak claim, outlined a specific revision, and asked exactly how to strengthen it.
    This is strategic help-seeking – you're learning to self-diagnose and target feedback.
    Your revised claim is stronger, but now integrate evidence more smoothly.
    Instead of: "[WEAK INTEGRATION]"
    Try: "[SMOOTH INTEGRATION EXAMPLE]"
    Notice how the evidence flows naturally into the explanation? That's the refinement level you're reaching.
    Revise and try again. You're developing real academic argument skills.

# ============================================================================
# SECTION 3: DISCOURSE ORGANIZATION & COHESION FEEDBACK
# ============================================================================

discourse_organization:
  
  # NO HELP-SEEKING – LOW COGNITIVE DEMAND
  weak_cohesion_none_low: >
    Your paragraph has ideas, but they don't connect smoothly.
    Your readers get lost between sentences.
    SOLUTION: Add transition words and phrases.
    USE THESE TRANSITIONS:
    - After introducing an idea: "Furthermore," "In addition," "Similarly,"
    - Before explaining consequences: "As a result," "Therefore," "Consequently,"
    - Before contrasting: "However," "In contrast," "On the other hand,"
    TASK: Rewrite two sentences in your paragraph, adding one transition word to each.
  
  # NO HELP-SEEKING – MODERATE DEMAND
  weak_cohesion_none_moderate: >
    Your ideas are clearer now, but the paragraph still jumps between thoughts.
    The problem is not just transitions – it's TOPIC SEQUENCE.
    READ YOUR PARAGRAPH ALOUD: Does each sentence build logically on the previous?
    OR do some sentences feel disconnected?
    REVISION TASK: Reorganize your sentences in a logical order.
    LOGICAL SEQUENCES USUALLY FOLLOW: Main idea → Supporting point → Evidence → Explanation → Link back to main idea.
    Reorder and try again.
  
  # ADAPTIVE HELP-SEEKING – HIGH DEMAND
  weak_cohesion_adaptive_high: >
    You correctly identified that your paragraph feels disjointed AND you attempted to reorder the sentences.
    Here's the professional writer's next step: Not every sentence needs to start a new idea.
    You can COMBINE sentences using subordination (one idea depends on the other).
    YOUR PARAGRAPH: "[ORIGINAL SENTENCES]"
    PROFESSIONAL VERSION: "[COMBINED VERSION EXAMPLE]"
    Notice: Fewer sentences, but more cohesive. All ideas clearly connected.
    Revise using one combined sentence in your paragraph, then submit for final review.
    You're learning the sophisticated structure of mature academic writing.

# ============================================================================
# SECTION 4: LINGUISTIC ACCURACY & VOCABULARY FEEDBACK
# ============================================================================

linguistic_accuracy:
  
  # NO HELP-SEEKING – CORRECTIVE
  high_error_density_direct_correction: >
    Your paragraph has frequent grammatical errors that interfere with meaning.
    ERRORS FOUND: [LIST SPECIFIC ERRORS]
    CORRECTIONS NEEDED:
    1. "[INCORRECT]" → "[CORRECT]" (reason: GRAMMATICAL RULE)
    2. "[INCORRECT]" → "[CORRECT]" (reason: GRAMMATICAL RULE)
    3. "[INCORRECT]" → "[CORRECT]" (reason: GRAMMATICAL RULE)
    TASK: Correct these three errors, then check the rest of your paragraph for similar patterns.
  
  # HELP-SEEKING PRESENT – INDIRECT
  high_error_density_help_seeking: >
    I see you're struggling with grammar (you asked about tense consistency).
    Instead of correcting every error for you, let me teach you the pattern.
    YOUR ERROR PATTERN: You mix present and past tense in the same paragraph.
    RULE: Choose ONE tense for the whole paragraph (unless you have a specific reason to shift).
    FIND THE ERROR: Highlight every verb in your paragraph in different colors (present = green, past = red).
    Count them. What tense is more frequent?
    Use that tense throughout, except where the meaning requires a shift.
    Submit the grammar-corrected version and I'll check for consistency.
  
  # ADAPTIVE HELP-SEEKING – METACOGNITIVE
  error_correction_adaptive_seeking: >
    You found and corrected your tense errors BEFORE asking for help. Excellent self-monitoring!
    Now you can apply this skill to other grammar. You've learned to:
    1. Identify error patterns (not just individual errors).
    2. Apply grammatical rules consistently.
    3. Self-check before asking for confirmation.
    This is the hallmark of independent writers.
    Your remaining grammar is mostly correct. Focus now on vocabulary precision instead.
    Replace general words with specific, academic alternatives.
    EXAMPLE: Rather than "good," use "effective," "persuasive," "well-researched."
    Revise three vocabulary phrases in your paragraph using this approach.

# ============================================================================
# SECTION 5: REVISION BEHAVIOR & EFFORT INDICATORS
# ============================================================================

revision_engagement:
  
  # NO REVISION – MOTIVATIONAL
  no_revision_motivational: >
    You submitted your paragraph on the first draft without any revisions.
    This makes improvement unlikely.
    PROFESSIONAL WRITERS (journalists, academics, authors) revise 5-10 times on average.
    WHAT TO DO: Submit a revised version that includes:
    - At least one stronger example or piece of evidence.
    - At least two transition words to improve flow.
    - One grammatical correction.
    Even these small revisions will improve your score noticeably.
    Revision is not punishment – it's how writing develops. Try it.
  
  # LIMITED REVISION – STRATEGIC
  limited_revision_strategic: >
    You revised once, which shows effort. Many revisions were cosmetic (small word changes).
    But deep revisions (changing ideas, reorganizing, rewriting) are what strengthen writing.
    COMPARE: Your Draft 1: "[ORIGINAL]"
                Your Draft 2: "[REVISION]"
    CHANGE MADE: Only surface-level word replacement.
    NEXT LEVEL: A deep revision would [SPECIFIC SUGGESTION].
    Try making one substantial revision (not just word changes) and submit Draft 3.
  
  # MULTIPLE REVISIONS – REINFORCEMENT
  multiple_revisions_reinforcement: >
    Excellent revision ethic! You revised three times, and each version shows improvement.
    From Draft 1 to Draft 3, I see:
    - Stronger argument development (Draft 1 vs Draft 3 comparison).
    - Better cohesion (transitions added and reorganized).
    - Improved clarity overall.
    This is exactly what self-regulated learning looks like.
    You've hit the level where further revision will have diminishing returns.
    Your current version is solid. Move forward with confidence.

# ============================================================================
# SECTION 6: HELP-SEEKING BEHAVIOR FEEDBACK
# Three Levels: None, Present, Adaptive
# ============================================================================

help_seeking_feedback:
  
  # LEVEL 1: NO HELP-SEEKING
  no_help_seeking_normalization: >
    I notice you worked independently without asking for help, even when the paragraph had weaknesses.
    Here's important: Asking for help is a STRENGTH, not a weakness.
    Professional writers, students in advanced classrooms, and independent learners all use feedback actively.
    Next time, if you're unsure about organization or argument strength, raise your hand (or type a question).
    I'm here to help. Using that help strategically is how writers improve fastest.
  
  # LEVEL 2: HELP-SEEKING PRESENT (unstructured)
  help_seeking_present_coaching: >
    Good! You asked for help, and showing that you're thinking about your work is valuable.
    But your question was [SLIGHTLY VAGUE]: "[QUESTION]"
    Next time, be more specific:
    - INSTEAD OF: "How do I make this better?"
    - TRY: "My argument feels weak. How do I strengthen the evidence?"
    Specific questions get specific, useful answers.
    Reframe your question and ask again. I'll give you more targeted help.
  
  # LEVEL 3: ADAPTIVE HELP-SEEKING (strategic, targeted)
  help_seeking_adaptive_praise: >
    You approached this perfectly! You:
    1. Tried first (didn't ask immediately).
    2. Identified exactly where help was needed ("[SPECIFIC ISSUE]").
    3. Asked a targeted question.
    4. Worked on implementing the suggestion.
    This is STRATEGIC HELP-SEEKING – the hallmark of advanced self-regulated learners.
    Keep using help this way. It accelerates improvement dramatically.
    Your growth is evident in how you're engaging with feedback and revision.

# ============================================================================
# SECTION 7: COMPOSITE FEEDBACK (combining multiple issues)
# ============================================================================

composite_scenarios:
  
  # Scenario 1: High engagement + weak argument
  high_effort_weak_argument: >
    You've invested significant time and effort (great!), and you're asking good questions (excellent!).
    But your output isn't matching your input yet.
    This gap between effort and product usually means a STRATEGY gap, not an effort gap.
    You're working hard but maybe not on the right things.
    STRATEGIC ADJUSTMENT: Focus your revision effort specifically on ARGUMENT DEVELOPMENT.
    Spend 50% of next session building stronger evidence and explanation.
    Spend 20% on fixing grammar.
    Spend 30% on organization.
    This rebalancing, combined with your existing effort, will show real improvement.
  
  # Scenario 2: Help-Seeking + Low Confidence
  help_seeking_confidence_building: >
    You're asking lots of questions, which shows engagement with the task.
    But I notice you express doubt in your messages: "[EXAMPLE OF DOUBT]"
    Here's the truth: You CAN do this. You're clearly thinking critically.
    You're just in the **learning zone** – not yet automatic, but definitely progressing.
    Next feedback cycle, try:
    - Attempt a revision with confidence (even if you're not certain).
    - Submit it and let me confirm what's working.
    Small wins build confidence. You'll be surprised at how much you can already do.

  # Scenario 3: Strong Performance + Advanced Challenge
  strategic_engaged_advanced_challenge: >
    Your paragraph is well-developed, organized, and grammatically accurate.
    You're performing at the strong level.
    Now let's push you to the ADVANCED level.
    NEXT CHALLENGE: Address a counterargument.
    Your argument: "[ARGUMENT]"
    COUNTERARGUMENT: "[POSSIBLE OPPOSING VIEW]"
    Add a paragraph that acknowledges this counterargument and explains why your position is stronger.
    Academic writing at the highest level engages with opposing views. Try it.

# ============================================================================
# SECTION 8: TEACHER ONSITE INTERVENTION SCRIPTS
# ============================================================================

onsite_intervention_scripts:
  
  scaffolded_planning_session: >
    [TEACHER SCRIPT FOR 10-MINUTE SESSION]
    1. Student describes their topic (1 minute).
    2. Teacher asks: "What does the rubric say is most important?" (2 minutes – guide student to rubric).
    3. Together, outline paragraph: "What's your main point?" → "What's your evidence?" → "How do they connect?" (5 minutes).
    4. Student begins drafting while teacher observes (2 minutes).
    OUTCOME: Clear outline + shared understanding of task expectations.
  
  argument_development_conference: >
    [TEACHER SCRIPT FOR 15-MINUTE SESSION]
    1. Student reads their paragraph aloud (3 minutes).
    2. Teacher asks: "What is the ONE main idea?" → "What evidence support it?" → "How do they connect?" (3 minutes).
    3. If unclear, model a stronger version on paper together (5 minutes).
    4. Student revises while teacher circulates (4 minutes).
    OUTCOME: Clearer understanding of claim-evidence-explanation structure.
  
  revision_strategy_coaching: >
    [TEACHER SCRIPT FOR 10-MINUTE SESSION]
    1. Student shows Draft 1 and Draft 2 side by side.
    2. Teacher asks: "Show me one sentence you changed substantially. Why?" (3 minutes).
    3. Teacher models: "Substantial revision looks like this: [BEFORE → AFTER]." (3 minutes).
    4. Student attempts one substantial revision while teacher guides (4 minutes).
    OUTCOME: Student understands difference between cosmetic and deep revision.

# ============================================================================
# SECTION 9: FEEDBACK SELECTION MATRIX
# Use this matrix to select appropriate feedback variant
# ============================================================================

selection_matrix:
  planning_weak:
    help_seeking_none: "no_planning_none_seeking"
    help_seeking_present: "no_planning_help_seeking_present"
    help_seeking_adaptive: "no_planning_help_seeking_adaptive"
  
  argument_weak:
    demandlow_seeking_none: "weak_argument_none_seeking_low_demand"
    demand_moderate_seeking_none: "weak_argument_none_seeking_moderate_demand"
    demand_high_seeking_none: "weak_argument_none_seeking_high_demand"
    seeking_present_stage1: "weak_argument_help_seeking_present_stage1"
    seeking_present_stage2: "weak_argument_help_seeking_present_stage2"
    seeking_adaptive_advanced: "weak_argument_adaptive_seeking_advanced"
  
  cohesion_weak:
    demand_low_seeking_none: "weak_cohesion_none_low"
    demand_moderate_seeking_none: "weak_cohesion_none_moderate"
    demand_high_seeking_adaptive: "weak_cohesion_adaptive_high"
  
  error_high_density:
    seeking_none_directive: "high_error_density_direct_correction"
    seeking_present_indirect: "high_error_density_help_seeking"
    seeking_adaptive_metacognitive: "error_correction_adaptive_seeking"
  
  revision_limited:
    no_revision: "no_revision_motivational"
    limited_revision: "limited_revision_strategic"
    multiple_revisions: "multiple_revisions_reinforcement"
  
  help_seeking_level:
    none_present: "no_help_seeking_normalization"
    present_unstructured: "help_seeking_present_coaching"
    adaptive_strategic: "help_seeking_adaptive_praise"
