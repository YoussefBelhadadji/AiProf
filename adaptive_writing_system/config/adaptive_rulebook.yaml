# WriteLens Adaptive Rulebook (2026 Academic Edition)
# Evidence-Centered Design: Observable evidence → Pedagogical claims → Adaptive interventions
# References: Mislevy (2003); Weigle (2002); Siemens (2013); Zimmerman (2000); Hyland (2019)

metadata:
  title: "WriteLens Comprehensive Adaptive Rulebook"
  description: "Rule-based mapping from evidence indicators and AI states to pedagogical interventions"
  version: "2.0"
  last_updated: "2026-04-02"
  framework: "Evidence-Centered Design + Self-Regulated Learning Theory + Adaptive Feedback"
  total_rules: 18

# ============================================================================
# LEARNER PROFILE RULES (4 learner behavioral clusters)
# ============================================================================

profile_rules:
  - profile_id: "disengaged"
    priority: 120
    display_label: "Disengaged Learner"
    description: "Low engagement behavioral pattern with minimal task interaction"
    conditions:
      ai_states:
        all:
          - engagement_risk: "High"
          - time_on_task_band: "Low"
          - rubric_views: 0
    evidence_indicators:
      - low_assignment_views
      - no_productive_re_entry
      - minimal_resource_access
      - no_help_seeking
    pedagogical_interpretation: "Behavioral participation is too low for detailed feedback to be effective. Learner needs motivational re-engagement first."
    adaptation_strategy: "Simplified task re-entry with external motivation and explicit direction"
    theoretical_justification: "Siemens (2013) - disengagement is earliest intervention point; Zimmerman (2000) - forethought phase requires active participation"
    response_template: "motivational_reengagement"
    onsite_intervention: "motivational_checkin_and_task_restart"

  - profile_id: "effortful_struggling"
    priority: 110
    display_label: "Effortful but Struggling"
    description: "High engagement effort with developing performance"
    conditions:
      ai_states:
        all:
          - engagement_risk: "Low"
          - time_on_task_band: "Moderate to Strong"
          - final_score_band: "Low"
          - revision_frequency_band: "Moderate"
    evidence_indicators:
      - high_time_on_task
      - good_rubric_consultation
      - multiple_feedback_views
      - active_help_seeking
      - low_quality_scores
    pedagogical_interpretation: "Learner invests effort but produces developing-quality work. Gap between effort and output suggests need for strategic instruction, not effort escalation."
    adaptation_strategy: "Explicit strategic instruction paired with metacognitive training"
    theoretical_justification: "Zimmerman (2000) - effort without strategy needs targeted support; Brophy (2010) - explicit instruction on strategies required"
    response_template: "strategic_instruction"
    onsite_intervention: "explicit_strategy_training"

  - profile_id: "fragile_efficient"
    priority: 100
    display_label: "Efficient but Fragile"
    description: "One-draft submission with moderate performance"
    conditions:
      ai_states:
        all:
          - revision_frequency_band: "Low"
          - final_score_band: "Moderate"
          - time_on_task_band: "Moderate"
          - argumentation_state: "Medium"
    evidence_indicators:
      - limited_revision_frequency
      - no_deep_revision
      - single_draft_pattern
      - moderate_scores
      - limited_improvement_potential
    pedagogical_interpretation: "Learner achieves moderate success with one-draft approach but needs revision process instruction to unlock improvement potential"
    adaptation_strategy: "Revision strategy coaching + feedback-to-revision mapping"
    theoretical_justification: "Hayes (2012) - revision is essential for writing development; Zimmerman (2000) - self-monitoring reveals revision needs"
    response_template: "revision_strategy_coaching"
    onsite_intervention: "revision_process_training"

  - profile_id: "strategic_engaged"
    priority: 85
    display_label: "Strategic & Engaged"
    description: "High engagement with strong performance trajectory"
    conditions:
      ai_states:
        all:
          - engagement_risk: "Low"
          - time_on_task_band: "Strong"
          - final_score_band: "Strong"
          - revision_frequency_band: "Strong"
          - improvement_trajectory: "Positive"
    evidence_indicators:
      - frequent_revision_cycles
      - high_rubric_consultation
      - strong_scores
      - active_help_seeking
      - positive_growth_pattern
    pedagogical_interpretation: "Learner demonstrates advanced self-regulated learning. Needs advanced challenge and metacognitive reflection."
    adaptation_strategy: "Advanced task complexity + metacognitive reflection on strategies"
    theoretical_justification: "Zimmerman (2000) - advanced learners benefit from reflection; Hanlonetal (2010) - metacognitive awareness accelerates expertise"
    response_template: "advanced_challenge"
    onsite_intervention: "metacognitive_reflection_session"

# ============================================================================
# CONTENT-FOCUSED PEDAGOGICAL RULES (15+ rules by writing area)
# ============================================================================

feedback_rules:

  # === BLOCK A: Planning & Pre-Writing Competencies ===

  - rule_id: "A1"
    category: "Planning & Criteria Awareness"
    priority: 105
    display_label: "Weak Planning Detected"
    conditions:
      thresholds:
        all:
          - rubric_views: 0
          - time_on_task: "< 15"
          - word_count: "< 80"
      ai_states:
        all:
          - forethought_risk: "High"
    evidence_chain: "No rubric consultation + minimal time + underdeveloped content → Weak pre-writing planning"
    pedagogical_claim: "Learner did not engage in adequate planning; criteria awareness is missing before drafting"
    adaptive_feedback_type: "Metacognitive + Feedforward Scaffold"
    feedback_focus: "Plan before writing. Consult the rubric. Outline your paragraph structure before drafting."
    cognitive_demand: "Low (direct instruction in planning steps)"
    response_template: "planning_scaffold"
    onsite_intervention:
      - "rubric_walkthrough_and_outline_support"
      - "guided_brainstorming_session"
    theoretical_justification: "Zimmerman (2000) - forethought phase is foundational to SRL; Nicol & Macfarlane-Dick (2006) - criteria awareness is prerequisite for improvement"
    growth_marker: "Next: Monitor if planning effort increases (rubric_views increase) → move to quality feedback"

  - rule_id: "A2"
    category: "Planning & Criteria Awareness"
    priority: 95
    display_label: "Strong Planning Indicators"
    conditions:
      thresholds:
        all:
          - rubric_views: ">= 3"
          - first_access_timing: "<= 12"
          - time_on_task: "> 30"
    evidence_chain: "Early access + frequent rubric consultation + sustained engagement → Strong planning behavior"
    pedagogical_claim: "Learner demonstrates strong planning and criteria awareness"
    adaptive_feedback_type: "Advancement to Higher-Order Thinking"
    feedback_focus: "Excellent planning approach! Now focus on deepening your argument with examples and reasoning."
    cognitive_demand: "High (advanced challenge)"
    response_template: "advancement_to_higher_order"
    onsite_intervention: "advanced_argument_development_workshop"
    theoretical_justification: "Bloom's taxonomy - learners ready for analysis/synthesis when foundational skills strong"

  - rule_id: "A3"
    category: "Planning & Criteria Awareness"
    priority: 90
    display_label: "Late Start Risk"
    conditions:
      thresholds:
        all:
          - first_access_timing: "> 36"
          - time_on_task: "< 30"
      ai_states:
        all:
          - procrastination_risk: "High"
    evidence_chain: "Delayed task entry + limited time + probable procrastination → At-risk for quality"
    pedagogical_claim: "Learner shows procrastination pattern that may compromise quality even if final submission appears adequate"
    adaptive_feedback_type: "Supportive reframing + Process coaching"
    feedback_focus: "Next time, start earlier so you have time to plan and revise. Quality comes from the process, not just the final product."
    cognitive_demand: "Medium (scaffolded metacognition)"
    response_template: "procrastination_awareness"
    onsite_intervention: "time_management_and_planning_workshop"
    theoretical_justification: "Steel (2007) - procrastination predicts lower work quality; Zimmerman (2000) - forethought includes time planning"

  # === BLOCK B: Discourse Organization & Cohesion ===

  - rule_id: "B1"
    category: "Discourse Organization"
    priority: 102
    display_label: "Weak Discourse Organization"
    conditions:
      thresholds:
        all:
          - organization_score: "<= 2"
          - cohesion_index: "< 2"
      ai_states:
        all:
          - discourse_competence: "Low"
    evidence_chain: "Low organization rubric score + low cohesion index → Ideas lack clear discourse structure"
    pedagogical_claim: "Paragraph structure and transitions are underdeveloped, reducing discourse clarity and flow"
    adaptive_feedback_type: "Strategic Discourse Feedback"
    feedback_focus: "Use clear topic sentences and transitions to guide your reader. Try: 'First...', 'Additionally...', 'In conclusion...'"
    cognitive_demand: "Low-to-Medium (direct modeling + practice)"
    response_template: "cohesion_support"
    onsite_intervention:
      - "transition_and_linking_support"
      - "sentence_combining_exercises"
    theoretical_justification: "Halliday & Hasan (1976) - cohesion essential for text coherence; Hyland (2019) - explicit transition instruction improves discourse control"
    growth_marker: "Monitor cohesion_index and organization_score on next submission for growth"

  - rule_id: "B2"
    category: "Discourse Organization"
    priority: 92
    display_label: "Adequate but Improvable Organization"
    conditions:
      thresholds:
        all:
          - organization_score: "== 3"
          - cohesion_index: "2.0-3.4"
      ai_states:
        all:
          - discourse_competence: "Moderate"
    evidence_chain: "Moderate organization + adequate transitions → Basic structure present but variety/sophistication limited"
    pedagogical_claim: "Organization exists but would benefit from more varied and sophisticated transitional devices"
    adaptive_feedback_type: "Refinement Feedback"
    feedback_focus: "Good structure! Now add more varied transitions and smoother connections between ideas."
    cognitive_demand: "Medium (refinement toward mastery)"
    response_template: "transition_refinement"
    onsite_intervention: "advanced_transition_and_linking_workshop"
    theoretical_justification: "Hyland (2019) - once basics mastered, focus shifts to sophistication and variety"

  - rule_id: "B3"
    category: "Discourse Organization"
    priority: 85
    display_label: "Strong Discourse Organization"
    conditions:
      thresholds:
        all:
          - organization_score: ">= 4"
          - cohesion_index: ">= 3.5"
    evidence_chain: "Strong organization + strong cohesion → Clear, well-structured discourse"
    pedagogical_claim: "Learner demonstrates strong discourse organization; focus can shift to rhetorical sophistication"
    adaptive_feedback_type: "Extension Challenge"
    feedback_focus: "Excellent paragraph structure! Now consider: How could you reorganize ideas for maximum rhetorical impact?"
    cognitive_demand: "High (rhetorical analysis)"
    response_template: "rhetorical_sophistication"
    onsite_intervention: "sentence_embedding_and_rhetorical_strategy_workshop"
    theoretical_justification: "Bloom's taxonomy - synthesis/evaluation level for advanced discourse skills"

  # === BLOCK C: Argumentation & Support ===

  - rule_id: "C1"
    category: "Argumentation"
    priority: 103
    display_label: "Underdeveloped Argumentation"
    conditions:
      thresholds:
        all:
          - argumentation_score: "< 2.4"
      ai_states:
        all:
          - argumentation_weakness: "High"
    evidence_chain: "Very low argumentation score → Claims lack adequate evidence and reasoning"
    pedagogical_claim: "Argument structure (claim-evidence-reasoning) is immature and needs explicit modeling"
    adaptive_feedback_type: "Direct Scaffolding + Modeling"
    feedback_focus: "State your claim clearly. Then provide a specific example. Finally, explain how the example supports your claim."
    cognitive_demand: "Low (direct claim-evidence-reason modeling)"
    response_template: "argument_scaffold"
    onsite_intervention:
      - "claim_evidence_explanation_modelling"
      - "guided_argument_construction"
    theoretical_justification: "Hyland (2019) - explicit argument structure modeling essential for novice writers; Toulmin (2003) - claim-evidence-warrant framework foundational"
    growth_marker: "Next submission: Check if C-E-R structure visible; advance feedback accordingly"

  - rule_id: "C2"
    category: "Argumentation"
    priority: 98
    display_label: "Developing Argumentation"
    conditions:
      thresholds:
        all:
          - argumentation_score: "2.4-3.6"
      ai_states:
        all:
          - argumentation_weakness: "Moderate"
    evidence_chain: "Moderate argument score → Basic claims present but support is inconsistent or partial"
    pedagogical_claim: "Argument is emerging; learner can benefit from refinement feedback focused on evidence quality and explanation depth"
    adaptive_feedback_type: "Refinement Feedback"
    feedback_focus: "Your claim is clear. Now strengthen it: Add better evidence or explain how the evidence proves your point."
    cognitive_demand: "Medium (guided practice toward mastery)"
    response_template: "argument_refinement"
    onsite_intervention: "evidence_integration_and_explanation_deepening"
    theoretical_justification: "Scaffolding theory - reduce support as competence increases; Hyland (2019) - evidence quality matters as much as presence"

  - rule_id: "C3"
    category: "Argumentation"
    priority: 88
    display_label: "Strong Argumentation"
    conditions:
      thresholds:
        all:
          - argumentation_score: ">= 3.7"
    evidence_chain: "High argument score → Clear claims well-supported with reasoning"
    pedagogical_claim: "Learner demonstrates argument control; ready for rhetorical sophistication and counter-argument integration"
    adaptive_feedback_type: "Advanced Challenge"
    feedback_focus: "Strong argument! Now: Can you anticipate and address an opposing viewpoint?"
    cognitive_demand: "High (counter-argument, rhetorical analysis)"
    response_template: "counter_argument_challenge"
    onsite_intervention: "counter_argument_and_rhetorical_strategy_workshop"
    theoretical_justification: "Bloom's taxonomy - synthesis/evaluation for advanced learners; Toulmin (2003) - rebuttal is advanced argumentative move"

  - rule_id: "C4"
    category: "Argumentation & Feedback Integration"
    priority: 93
    display_label: "Feedback Provided but Not Applied to Argument"
    conditions:
      thresholds:
        all:
          - feedback_views: ">= 2"
          - revision_frequency: ">= 1"
          - argumentation_score: "< 3"
      ai_states:
        all:
          - feedback_uptake_risk: "High"
    evidence_chain: "Feedback viewed + revision attempted BUT argument still low → Feedback understood but not applied at argument level"
    pedagogical_claim: "Learner is engaged with feedback but needs explicit linking between teacher comments and argument-level changes"
    adaptive_feedback_type: "Feedback-Decoding Scaffold"
    feedback_focus: "I see you revised. Let me show you: My comment about 'add evidence' means you should give a specific example that proves your claim."
    cognitive_demand: "Medium (explicit metacognitive bridge)"
    response_template: "feedback_decoding"
    onsite_intervention: "feedback_to_revision_mapping"
    theoretical_justification: "Carless & Boud (2018) - feedback decoding skill must be explicitly taught; Hattie & Timperley (2007) - feedback only effective if understood"

  # === BLOCK D: Grammar & Vocabulary ===

  - rule_id: "D1"
    category: "Grammar & Linguistic Accuracy"
    priority: 100
    display_label: "High Error Density - Grammar Focus"
    conditions:
      thresholds:
        all:
          - error_density: ">= 8"
          - grammar_accuracy: "<= 2"
      ai_states:
        all:
          - linguistic_accuracy_risk: "High"
    evidence_chain: "High error density + low grammar score → Recurring grammar problems reduce clarity"
    pedagogical_claim: "Systematic grammar gaps are interfering with meaning; direct error correction and rule-focused instruction needed"
    adaptive_feedback_type: "Direct Corrective Feedback"
    feedback_focus: "You have repeated errors in [specific pattern]. Here's the rule: [explain]. Practice: [exercise]."
    cognitive_demand: "Low (rule explanation + practice)"
    response_template: "direct_corrective_feedback"
    onsite_intervention:
      - "targeted_error_correction_cycle"
      - "grammar_rule_mini_lesson"
      - "pattern_specific_practice"
    theoretical_justification: "Ferris (2006) - error density > 8% indicates need for explicit instruction; direct corrective feedback most effective for grammar"

  - rule_id: "D2"
    category: "Vocabulary & Lexical Range"
    priority: 90
    display_label: "Limited Vocabulary Range"
    conditions:
      thresholds:
        all:
          - type_token_ratio: "< 0.45"
    evidence_chain: "Low TTR → Limited word variety; repetitive word choices"
    pedagogical_claim: "Vocabulary diversity is restricted; learner would benefit from synonym exploration and academic register expansion"
    adaptive_feedback_type: "Vocabulary Development Scaffolding"
    feedback_focus: "You use '[repeated word]' many times. Try these alternatives: [list synonyms with examples]. This strengthens your voice."
    cognitive_demand: "Low-to-Medium (vocabulary building)"
    response_template: "vocabulary_development"
    onsite_intervention:
      - "synonym_and_academic_register_workshop"
      - "word_choice_refinement_practice"
    theoretical_justification: "Lexical range indicator of writing sophistication; vocabulary diversity supports academic register development"

  # === BLOCK E: Revision Behavior & Self-Regulated Learning ===

  - rule_id: "E1"
    category: "Revision Behavior"
    priority: 104
    display_label: "No Revision Submitted"
    conditions:
      thresholds:
        all:
          - revision_frequency: "== 0"
      ai_states:
        all:
          - revision_depth: "None"
    evidence_chain: "Single draft submission → No revision cycle visible"
    pedagogical_claim: "Critical gap in self-regulated learning (Performance & Reflection phases); learner has not engaged revision process"
    adaptive_feedback_type: "Process Training + Metacognitive Prompts"
    feedback_focus: "Revision is how writers improve. Next time: Draft, then read it again and ask 'Is this clear? Is it complete?'"
    cognitive_demand: "Low-to-Medium (SRL process instruction)"
    response_template: "revision_process_introduction"
    onsite_intervention:
      - "guided_revision_checklist"
      - "self_assessment_and_revision_planning"
    theoretical_justification: "Hayes (2012) - revision essential for writing development; Zimmerman (2000) - self-monitoring/evaluation phase critical for SRL"
    growth_indicator: "Next submission must show revision_frequency >= 1"

  - rule_id: "E2"
    category: "Revision Depth & Quality"
    priority: 94
    display_label: "Limited Revision - Possible Superficial Changes"
    conditions:
      thresholds:
        all:
          - revision_frequency: "1-2"
          - feedback_views: ">= 1"
      ai_states:
        all:
          - revision_depth: "Low"
    evidence_chain: "1-2 revisions with feedback access BUT persistent content/quality issues → Revision may be surface-level only"
    pedagogical_claim: "Learner attempts revision but may be focused on mechanics rather than content/meaning changes"
    adaptive_feedback_type: "Revision Strategy Coaching"
    feedback_focus: "Good that you revised! But deep revision means: Rethink your ideas, restructure if needed, strengthen evidence. Not just spell-check."
    cognitive_demand: "Medium (guided practice in revision strategy)"
    response_template: "revision_strategy_coaching"
    onsite_intervention: "revision_depth_and_strategy_workshop"
    theoretical_justification: "Miles & Shevlin (2017) - superficial revision limits improvement; learners need explicit coaching in revision depth"

  - rule_id: "E3"
    category: "Revision Impact Analysis"
    priority: 85
    display_label: "Strong Revision Pattern with Growth"
    conditions:
      thresholds:
        all:
          - revision_frequency: ">= 3"
          - score_improvement: ">= 1.0"
      ai_states:
        all:
          - revision_depth: "Deep"
          - improvement_trajectory: "Positive"
    evidence_chain: "Multiple revisions + score improvement >= 1.0 → Strategic revision cycles generating improvement"
    pedagogical_claim: "Learner demonstrates advanced self-regulated learning through strategic revision cycles"
    adaptive_feedback_type: "Metacognitive Reflection & Strategy Reinforcement"
    feedback_focus: "Your revisions are really paying off - I can see clear improvement. What strategies are you using? Keep doing them!"
    cognitive_demand: "High (metacognitive reflection)"
    response_template: "revision_strategy_reflection"
    onsite_intervention: "metacognitive_reflection_on_revision_strategies"
    theoretical_justification: "Zimmerman (2000) - reflection phase allows strategic insights to transfer to future tasks"

  # === BLOCK F: Feedback Uptake & Integration ===

  - rule_id: "F1"
    category: "Feedback Engagement & Responsiveness"
    priority: 96
    display_label: "Feedback Viewed But Not Applied"
    conditions:
      thresholds:
        all:
          - feedback_views: ">= 2"
          - revision_frequency: "== 0"
      ai_states:
        all:
          - feedback_uptake_risk: "High"
          - revision_depth: "None"
    evidence_chain: "Multiple feedback views + no revision → Feedback accessed but not acted upon"
    pedagogical_claim: "Learner is reading feedback but not translating it into revision action; needs explicit linking instruction"
    adaptive_feedback_type: "Feedback-to-Action Bridge"
    feedback_focus: "I see you read my feedback. Now: Come back and revise based on my comments. Here's how to start: [specific action]."
    cognitive_demand: "Medium (bridging comprehension to action)"
    response_template: "feedback_to_revision_linking"
    onsite_intervention: "feedback_comprehension_and_revision_planning"
    theoretical_justification: "Hattie & Timperley (2007) - feedback effectiveness depends on comprehension AND action; Carless & Boud (2018) - feedback to action gap common in novices"

  - rule_id: "F2"
    category: "Feedback Responsiveness & Growth"
    priority: 86
    display_label: "Feedback-Responsive Writer with Growth"
    conditions:
      thresholds:
        all:
          - feedback_views: ">= 2"
          - revision_frequency: ">= 2"
          - score_improvement: ">= 1.0"
      ai_states:
        all:
          - feedback_uptake_risk: "Low"
    evidence_chain: "Multiple feedback views + multiple revisions + score improvement → Strategic feedback integration and growth"
    pedagogical_claim: "Learner demonstrates feedback responsiveness and translates comments into meaningful improvement"
    adaptive_feedback_type: "Encouragement + Metacognitive Reflection"
    feedback_focus: "Excellent - I can see you understand and apply my feedback. What are you learning about your writing from this process?"
    cognitive_demand: "High (metacognitive)"
    response_template: "feedback_responsiveness_affirmation"
    onsite_intervention: "learning_reflection_session"
    theoretical_justification: "Hattie & Timperley (2007) - feedback works; learners who understand and act on it accelerate learning"

  # === BLOCK G: Help-Seeking as Metacognitive Indicator ===

  - rule_id: "G1"
    category: "Help-Seeking Behavior"
    priority: 91
    display_label: "No Help Seeking - Possible Isolation"
    conditions:
      thresholds:
        all:
          - help_seeking_messages: "== 0"
      ai_states:
        all:
          - help_seeking_risk: "Low Adaptive Help-Seeking"
    evidence_chain: "Zero help-seeking messages → Learner has not sought external assistance"
    pedagogical_claim: "Help-seeking is part of adaptive self-regulated learning; absence may indicate either confidence or reluctance"
    adaptive_feedback_type: "Normalizing + Entry Point"
    feedback_focus: "It's OK to ask questions! I'm here to help. If you're ever unsure about something, post a question below."
    cognitive_demand: "Low (permission + invitation)"
    response_template: "help_seeking_normalization"
    onsite_intervention: "early_check_in_and_support_offering"
    theoretical_justification: "Newman & Schwager (1995) - adaptive help-seeking builds competence; learners need explicit permission to seek help"

  - rule_id: "G2"
    category: "Help-Seeking Quality & Adaptiveness"
    priority: 87
    display_label: "Adaptive Help-Seeking Pattern Detected"
    conditions:
      thresholds:
        all:
          - help_seeking_messages: ">= 3"
      ai_states:
        all:
          - help_seeking_pattern: "Adaptive"
          - question_specificity: "High"
    evidence_chain: "Multiple, specific help-seeking questions → Strategic help-seeking behavior"
    pedagogical_claim: "Learner demonstrates adaptive help-seeking (specific, focused questions); this is metacognitive self-regulation evidence"
    adaptive_feedback_type: "Reinforcement + Advanced Support"
    feedback_focus: "I appreciate your specific questions - shows you're thinking carefully. Here's how to dig even deeper: [advanced scaffolding]."
    cognitive_demand: "High (advanced metacognitive support)"
    response_template: "adaptive_help_seeking_reinforcement"
    onsite_intervention: "advanced_problem_solving_workshop"
    theoretical_justification: "Ryan & Pintrich (1997) - adaptive help-seeking predicts positive learning outcomes; should be explicitly reinforced"

# ============================================================================
# RULE APPLICATION GUIDANCE
# ============================================================================

application_framework: |
  
  RULE SELECTION SEQUENCE:
  
  1. Identify learner profile (Disengaged / Effortful-Struggling / Fragile-Efficient / Strategic-Engaged)
  2. Within profile, evaluate content rules A-G in priority order
  3. Select rules with HIGHEST priority that match learner evidence
  4. Combine multi-rule feedback into single coherent response (max 3 rules triggered per cycle)
  
  COGNITIVE DEMAND ADAPTATION:
  
  Low Cognitive Demand (Direct Instruction):
  Use when: Learner struggling, limited prior success, needs explicit model
  Rules: A1, C1, D1, E1
  
  Medium Cognitive Demand (Guided Practice):
  Use when: Emerging competence, some success, ready for refinement
  Rules: A2, B2, C2, E2, F1
  
  High Cognitive Demand (Metacognitive Reflection):
  Use when: Advanced competence, consistent success, ready for analysis/synthesis
  Rules: A2, B3, C3, E3, F2, G2
  
  SEQUENCING ACROSS DRAFTS:
  
  Draft 1: Focus rules A, D, E1 (planning, mechanics, revision introduction)
  Draft 2: Focus rules B, C, E2 (organization, argumentation, revision depth)
  Draft 3+: Focus rules C3, E3, F2, G2 (advancement, growth, reflection)
  
  INTERVENTION ESCALATION:
  
  If rule triggered 2+ consecutive times: Schedule onsite intervention
  If rule triggered 3+ consecutive times: Intensive individual support required
  If profile risk is "Disengaged": Immediate intervention regardless of rule count
