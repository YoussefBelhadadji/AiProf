  "feedback_rules": [
    {
      "rule_id": "A1",
      "category": "Planning",
      "enabled": true,
      "priority": 140,
      "conditions": {
        "thresholds": {
          "all": {
            "low_planning": true,
            "low_word_count": true,
            "low_time_on_task": true
          }
        },
        "ai_states": {
          "all": {
            "profile_id": [
              "disengaged_low_participation"
            ]
          }
        }
      },
      "display": {
        "raw_data_condition": "rubric_views = 0 + time_on_task < 15 + word_count < 80",
        "ai_learner_state_output": "Forethought risk = High",
        "pedagogical_interpretation": "Weak planning and low criteria awareness constrain the learner before drafting begins.",
        "adaptive_feedback_type": "Metacognitive + feedforward scaffold",
        "feedback_message_focus": "Plan before writing, consult the rubric, and outline the paragraph structure.",
        "theoretical_justification": "Zimmerman (2000); Nicol and Macfarlane-Dick (2006)"
      },
      "actions": {
        "feedback_templates": [
          "planning_scaffold"
        ],
        "onsite_interventions": [
          "rubric_walkthrough_and_outline_support"
        ],
        "focus_statement": "Re-engage the learner, build planning habits, increase task understanding, and require minimum paragraph development before deeper writing feedback."
      }
    },
