# Rule Interpretations Configuration
# Maps AI output states to pedagogical rule interpretations
# Each interpretation represents an educationally meaningful diagnosis that justifies the feedback selection

rule_interpretations:

  # =========================
  # PROCESS / SELF-REGULATION RULES
  # =========================

  # Forethought Phase
  weak_criteria_consultation:
    ai_output: "forethought_risk == high"
    interpretation: "weak planning and weak criteria awareness"
    theory: "Zimmerman's forethought phase; assessment literacy (Carless & Boud)"
    pedagogical_meaning: "Learner has not engaged with rubric expectations; unaware of criteria for success"
    required_intervention: "explicit rubric walkthrough and planning support"
    feedback_priority: "high"

  partial_planning:
    ai_output: "forethought_risk == medium"
    interpretation: "partial planning; criteria awareness developing"
    theory: "SRL forethought developing"
    pedagogical_meaning: "Learner has some planning activity but incomplete; inconsistent criteria engagement"
    required_intervention: "targeted rubric focus before drafting"
    feedback_priority: "medium"

  strong_forethought:
    ai_output: "forethought_risk == low"
    interpretation: "strong forethought and criteria awareness"
    theory: "SRL forethought established"
    pedagogical_meaning: "Learner demonstrates active preparation and rubric consultation"
    required_intervention: "maintenance; focus on quality refinement"
    feedback_priority: "low"

  # Engagement
  disengagement_risk:
    ai_output: "engagement_risk == high"
    interpretation: "disengagement or low behavioural participation"
    theory: "Motivation and SRL engagement phases"
    pedagogical_meaning: "Learner has minimal interaction with assignment, resources, or feedback systems"
    required_intervention: "motivational re-engagement; barrier removal; structured participation"
    feedback_priority: "critical"

  variable_engagement:
    ai_output: "engagement_risk == medium"
    interpretation: "variable engagement; participation inconsistent"
    theory: "Developing SRL engagement"
    pedagogical_meaning: "Learner shows some participation but uneven or sporadic"
    required_intervention: "consistent engagement scaffolding"
    feedback_priority: "medium"

  consistent_engagement:
    ai_output: "engagement_risk == low"
    interpretation: "consistent, high engagement"
    theory: "Established SRL engagement"
    pedagogical_meaning: "Learner participates repeatedly and uses available resources"
    required_intervention: "none; leverage engagement for quality improvement"
    feedback_priority: "low"

  # Revision Behaviour (Performance Phase Monitoring)
  no_self_regulated_revision:
    ai_output: "revision_depth == high"
    interpretation: "weak self-regulated revision"
    theory: "Zimmerman's performance phase lacks monitoring"
    pedagogical_meaning: "Learner submitted work without any revision cycle; no evidence of proofreading or improvement"
    required_intervention: "explicit revision checklist; guided review; value for revision"
    feedback_priority: "critical"

  developing_revision:
    ai_output: "revision_depth == medium"
    interpretation: "developing revision competence"
    theory: "SRL monitoring is occasional but present"
    pedagogical_meaning: "Learner revised once but changes are surface-level or limited in scope"
    required_intervention: "global revision instruction; meaning-level feedback"
    feedback_priority: "high"

  strong_revision_regulation:
    ai_output: "revision_depth == low"
    interpretation: "strong self-regulated revision and control"
    theory: "SRL performance phase well-developed"
    pedagogical_meaning: "Learner demonstrates multiple revisions with evidence of meaning-level improvement"
    required_intervention: "none; reinforce strategy"
    feedback_priority: "low"

  # Feedback Uptake & Literacy
  feedback_not_accessed:
    ai_output: "feedback_uptake_state == high AND feedback_views == 0"
    interpretation: "weak feedback literacy / feedback not accessed"
    theory: "Carless & Boud's feedback literacy; feedback as learning resource"
    pedagogical_meaning: "Feedback was provided but learner has not engaged with it"
    required_intervention: "direct invitation to view feedback; explain value of feedback"
    feedback_priority: "high"

  feedback_accessed_not_acted:
    ai_output: "feedback_uptake_state == high AND feedback_views >= 1 AND revision_frequency == 0"
    interpretation: "weak feedback literacy / feedback not internalized"
    theory: "Feedback literacy includes interpretation and action"
    pedagogical_meaning: "Learner viewed feedback but did not translate it into revision"
    required_intervention: "feedback decoding; actionable guidance"
    feedback_priority: "high"

  partial_feedback_uptake:
    ai_output: "feedback_uptake_state == medium"
    interpretation: "partial feedback uptake; needs guidance"
    theory: "Feedback literacy developing"
    pedagogical_meaning: "Some revision occurred but alignment with feedback is incomplete"
    required_intervention: "feedforward guidance; clarify focus for next revision"
    feedback_priority: "medium"

  strong_feedback_uptake:
    ai_output: "feedback_uptake_state == low"
    interpretation: "strong feedback literacy and internalization"
    theory: "Mature feedback literacy"
    pedagogical_meaning: "Learner accesses feedback, understands it, and acts on it systematically"
    required_intervention: "none; reinforce pattern"
    feedback_priority: "low"

  feedback_not_used:
    ai_output: "feedback_uptake_state == low"
    interpretation: "Feedback provided but not used."
    theory: "Feedback literacy requires both access and action."
    pedagogical_meaning: "Learner has not engaged with feedback provided."
    required_intervention: "Encourage feedback review and explain its importance."
    feedback_priority: "high"

  partial_feedback_use:
    ai_output: "feedback_uptake_state == medium"
    interpretation: "Partial use of feedback."
    theory: "Feedback literacy developing."
    pedagogical_meaning: "Learner has engaged with feedback but not fully utilized it."
    required_intervention: "Guide learner on how to apply feedback effectively."
    feedback_priority: "medium"

  strong_feedback_use:
    ai_output: "feedback_uptake_state == high"
    interpretation: "Effective feedback use."
    theory: "Mature feedback literacy."
    pedagogical_meaning: "Learner has effectively internalized and acted on feedback."
    required_intervention: "Reinforce positive behavior and encourage further improvement."
    feedback_priority: "low"

  # Help-Seeking & Metacognitive Awareness
  passive_or_hidden_difficulty:
    ai_output: "help_seeking_state == none AND (argument_criterion_score <= 2 OR grammar_criterion_score <= 2)"
    interpretation: "passive approach or hidden difficulty; metacognitive awareness gap"
    theory: "SRL self-reflection phase missing; metacognitive monitoring weak"
    pedagogical_meaning: "Learner has not sought help despite weak product; suggests lack of awareness or reluctance"
    required_intervention: "metacognitive prompting; normalize help-seeking"
    feedback_priority: "critical"

  procedural_help_only:
    ai_output: "help_seeking_state == procedural"
    interpretation: "instrumental engagement; limited metacognitive regulation"
    theory: "SRL engagement present but not self-reflective"
    pedagogical_meaning: "Help-seeking is tactical (format, system) rather than strategic (learning, understanding)"
    required_intervention: "model content-level help-seeking"
    feedback_priority: "medium"

  adaptive_help_seeking:
    ai_output: "help_seeking_state == adaptive"
    interpretation: "active metacognitive regulation and learning mindset"
    theory: "Strong SRL self-reflection"
    pedagogical_meaning: "Learner actively seeks clarification on content, argument, language, or rubric"
    required_intervention: "leverage for deeper learning; provide rigorous dialogue"
    feedback_priority: "low"

  # =========================
  # PRODUCT / WRITING COMPETENCE RULES
  # =========================

  # Argumentation
  weak_argument_structure:
    ai_output: "argumentation_state == high"
    interpretation: "weak claim–evidence–reasoning structure"
    theory: "Academic writing pedagogy (Hyland); analytic rubric scoring (Weigle)"
    pedagogical_meaning: "Claim is absent, unclear, or unsupported; reasoning is weak or missing"
    required_intervention: "argument structure scaffold (claim–evidence–explanation)"
    feedback_priority: "high"

  developing_argument:
    ai_output: "argumentation_state == medium"
    interpretation: "argument present but underdeveloped"
    theory: "L2 writing development; developing argument competence"
    pedagogical_meaning: "Claim exists with some support, but explanation is shallow"
    required_intervention: "argument expansion; deeper reasoning"
    feedback_priority: "medium"

  strong_argument:
    ai_output: "argumentation_state == low"
    interpretation: "strong argumentative competence"
    theory: "Mature argument construction"
    pedagogical_meaning: "Clear claim with relevant evidence and developed explanation"
    required_intervention: "none; reinforce and extend"
    feedback_priority: "low"

  # Discourse and Cohesion
  discourse_organization_problem:
    ai_output: "discourse_state == high"
    interpretation: "discourse organization problem"
    theory: "Functional grammar and discourse analysis (Hyland)"
    pedagogical_meaning: "Text lacks clear structure; paragraph organization is disjointed; transitions are abrupt or missing"
    required_intervention: "paragraph structure support; transition instruction"
    feedback_priority: "high"

  developing_discourse:
    ai_output: "discourse_state == medium"
    interpretation: "discourse organization developing"
    theory: "SRL and writing development"
    pedagogical_meaning: "Some paragraph structure evident; transitions are inconsistent"
    required_intervention: "cohesion refinement; linking patterns"
    feedback_priority: "medium"

  strong_discourse:
    ai_output: "discourse_state == low"
    interpretation: "strong discourse competence"
    theory: "Mature discourse control"
    pedagogical_meaning: "Organization is clear; transitions are smooth and varied"
    required_intervention: "none; extend complexity"
    feedback_priority: "low"

  # Linguistic Accuracy
  persistent_grammar_difficulty:
    ai_output: "linguistic_accuracy_state == high"
    interpretation: "persistent linguistic accuracy problem"
    theory: "L2 writing; form-focused instruction (Long & Robinson)"
    pedagogical_meaning: "High error frequency; errors follow patterns; grammatical control is weak"
    required_intervention: "focused grammar instruction; pattern-based correction"
    feedback_priority: "high"

  developing_grammar:
    ai_output: "linguistic_accuracy_state == medium"
    interpretation: "developing grammatical control"
    theory: "Interlanguage development; error analysis"
    pedagogical_meaning: "Some error control evident; errors are sporadic rather than systematic"
    required_intervention: "metalinguistic feedback on patterns"
    feedback_priority: "medium"

  strong_grammar:
    ai_output: "linguistic_accuracy_state == low"
    interpretation: "strong linguistic accuracy"
    theory: "Form mastery established"
    pedagogical_meaning: "Errors are minimal and non-systematic; structures are controlled"
    required_intervention: "none; focus on complexity"
    feedback_priority: "low"

  # Lexical Resource
  restricted_lexical_repertoire:
    ai_output: "lexical_state == high"
    interpretation: "restricted lexical repertoire"
    theory: "Vocabulary development in L2 writing (Nation)"
    pedagogical_meaning: "Limited vocabulary range; heavy word repetition; basic academic vocabulary"
    required_intervention: "vocabulary enrichment; academic word list introduction"
    feedback_priority: "high"

  developing_lexical_precision:
    ai_output: "lexical_state == medium"
    interpretation: "developing lexical precision"
    theory: "Vocabulary expansion phase"
    pedagogical_meaning: "Vocabulary variety is present but not yet academic or precise"
    required_intervention: "lexical refinement; contextual word choice"
    feedback_priority: "medium"

  strong_lexical_competence:
    ai_output: "lexical_state == low"
    interpretation: "strong lexical competence"
    theory: "Advanced vocabulary control"
    pedagogical_meaning: "Academic vocabulary is used accurately; word choice is precise and varied"
    required_intervention: "none; extend nuance"
    feedback_priority: "low"

  # =========================
  # LEARNER PROFILE INTERPRETATIONS
  # =========================

  strategic_writer_profile:
    learner_profile: "strategic_writer"
    interpretation: "learner demonstrates strong self-regulation and competence across all phases"
    characteristics: "High planning, high engagement, multiple revisions, strong product quality"
    required_intervention: "minimal; focus on extension and challenge"
    feedback_type: "metacognitive_extension"
    feedback_priority: "low"

  engaged_developing_profile:
    learner_profile: "engaged_but_developing"
    interpretation: "high motivation and participation; skills need development"
    characteristics: "Strong effort and engagement, but moderate-to-weak product quality"
    required_intervention: "targeted skill instruction; strategy development"
    feedback_type: "explicit_strategic_instruction"
    feedback_priority: "medium"

  effortful_struggling_profile:
    learner_profile: "effortful_but_struggling"
    interpretation: "strong effort but weak strategy or knowledge gap"
    characteristics: "High engagement and revision, but weak product; may lack knowledge or strategy"
    required_intervention: "explicit strategy instruction; direct teaching"
    feedback_type: "explicit_strategic_instruction"
    feedback_priority: "high"

  disengaged_profile:
    learner_profile: "disengaged"
    interpretation: "participation and motivation risk requiring urgent re-engagement"
    characteristics: "Low engagement, minimal revision, weak participation"
    required_intervention: "motivational intervention; barrier removal; structured re-entry"
    feedback_type: "motivational_reengagement"
    feedback_priority: "critical"

  fragile_regulator_profile:
    learner_profile: "fragile_regulator"
    interpretation: "inconsistent control; needs metacognitive and strategy development"
    characteristics: "Strength in some phases or dimensions, weakness in others; inconsistent"
    required_intervention: "metacognitive training; consistent support"
    feedback_type: "metacognitive_training"
    feedback_priority: "high"

  # =========================
  # PREDICTIVE INTERPRETATIONS
  # =========================

  low_predicted_improvement:
    ai_output: "predicted_improvement == low"
    interpretation: "likely stagnation without strong support"
    theory: "Predictive analytics; intervention intensity"
    pedagogical_meaning: "Model indicates minimal score gain expected with standard feedback alone"
    required_intervention: "intensive support plan; increased frequency; possible 1:1"
    feedback_priority: "critical"

  moderate_predicted_improvement:
    ai_output: "predicted_improvement == medium"
    interpretation: "responsive to targeted development feedback"
    theory: "Typical learning curve; moderate intervention needed"
    pedagogical_meaning: "Model indicates standard targeted feedback should produce moderate gain"
    required_intervention: "targeted feedback on high-priority area"
    feedback_priority: "high"

  high_predicted_improvement:
    ai_output: "predicted_improvement == high"
    interpretation: "high potential; targeted feedback expected to accelerate growth"
    theory: "Responsive learner; strong trajectory"
    pedagogical_meaning: "Model indicates learner is well-positioned for rapid improvement"
    required_intervention: "focused feedback on key growth area"
    feedback_priority: "medium"

  # =========================
  # BAYESIAN COMPETENCE INTERPRETATIONS
  # =========================

  developing_argument_competence:
    ai_output: "argument_competence_prob == medium"
    interpretation: "developing but unstable argumentative competence"
    theory: "Probabilistic competence modeling"
    pedagogical_meaning: "Evidence is mixed; argument ability is not yet reliable; fluctuates"
    required_intervention: "stabilization practice; explicit instruction"
    feedback_type: "argument_refinement"
    feedback_priority: "high"

  weak_argument_competence:
    ai_output: "argument_competence_prob == low"
    interpretation: "weak argument competence; development needed"
    theory: "Low posterior on competence; substantial evidence of difficulty"
    pedagogical_meaning: "Evidence consistently points to weak argument construction"
    required_intervention: "foundational argument structure"
    feedback_type: "argument_scaffold"
    feedback_priority: "critical"

  strong_srl_revision_competence:
    ai_output: "srl_revision_competence_prob == high"
    interpretation: "strong self-directed revision competence"
    theory: "Mature SRL monitoring and control"
    pedagogical_meaning: "Posterior concentrates on high competence; revision is goal-directed"
    required_intervention: "leverage for peer review or advanced peer feedback"
    feedback_priority: "low"

  weak_srl_revision_competence:
    ai_output: "srl_revision_competence_prob == low"
    interpretation: "weak regulation of revision behaviour"
    theory: "SRL control phase underdeveloped"
    pedagogical_meaning: "Evidence points to passive revision or no revision; lacks self-directed improvement"
    required_intervention: "explicit metacognitive training on planning-monitoring-evaluation cycle"
    feedback_type: "metacognitive_training"
    feedback_priority: "critical"
