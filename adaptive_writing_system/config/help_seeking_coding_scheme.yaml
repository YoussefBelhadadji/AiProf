# WriteLens Help-Seeking Behavior Coding Scheme
# Framework: Newman & Schwager (1995), Zimmerman (2000) SRL Theory
# Purpose: Track and classify help-seeking behavior as metacognitive indicator
# Version: 1.0

metadata:
  framework: "Help-Seeking as Self-Regulated Learning Indicator"
  theoretical_basis: "Newman & Schwager (1995) help-seeking taxonomy + Zimmerman (2000) SRL phases"
  implementation: "Moodle message analysis + teacher observation coding"
  total_categories: 12
  evidence_link: "Help-seeking frequency is evidence for Self-Regulated Revision competence in Bayesian model"

# ============================================================================
# PRIMARY CLASSIFICATION: THREE LEVELS OF HELP-SEEKING
# ============================================================================

help_seeking_levels:
  
  # LEVEL 1: NO HELP-SEEKING (or absent help-seeking)
  level_1_none:
    code: "HS_NONE"
    display_name: "No Help-Seeking Observed"
    description: "Student works independently without requesting clarification or assistance"
    sublevels:
      - independent_work: "Works through task without asking questions"
      - silent_struggle: "Works but shows signs of difficulty without asking help"
      - disengagement: "Does not work or ask; task abandoned"
    srl_interpretation: "May indicate either strong independent competence OR weak metacognitive monitoring (early SRL phase struggle)"
    pedagogical_response: "Normalization: Explain that help-seeking is professional strategy"
    bayesian_evidence_weight: 0.3  # Neutral impact; clarify intention first
    feedback_variant: "no_help_seeking_normalization"
  
  # LEVEL 2: HELP-SEEKING PRESENT (but unstructured or late)
  level_2_present:
    code: "HS_PRESENT"
    display_name: "Help-Seeking Present (Unstructured)"
    description: "Student asks for help but questions are vague, late, or non-specific"
    sublevels:
      - vague_help_request: "Asks 'How do I make this better?' without specifying problem"
      - late_help_request: "Asks for help after submitting or very late in process"
      - unfocused_question: "Asks about [GENERAL TOPIC] but without specific paragraph reference"
      - complaint_vs_question: "Expresses frustration ('This is hard') rather than asking specific question"
      - help_avoidance_language: "Asks but includes self-doubt: 'But I know you're probably busy...'"
    srl_interpretation: "Indicates emerging self-monitoring (recognizes difficulty) but underdeveloped help-seeking strategy"
    pedagogical_response: "Coaching on targeted questions; teach how to ask for specific help"
    bayesian_evidence_weight: 0.5  # Moderate evidence of SRL; shows monitoring but needs strategy refinement
    feedback_variant: "help_seeking_present_coaching"
  
  # LEVEL 3: ADAPTIVE HELP-SEEKING (strategic, targeted, timely)
  level_3_adaptive:
    code: "HS_ADAPTIVE"
    display_name: "Help-Seeking Adaptive (Strategic)"
    description: "Student strategically requests targeted help at appropriate time with specific reference"
    sublevels:
      - specific_targeted_question: "Asks about specific paragraph/issue: 'My argument in sentence 3 is unclear. How do I strengthen it?'"
      - early_strategic_asking: "Asks for help early in process (after first attempt, before resubmission)"
      - self_diagnosis_asking: "Identifies own problem first, then asks how to fix: 'I think my cohesion is weak. What should I focus on?'"
      - attempted_then_asking: "Tries solution first, then asks confirmation: 'I added a transition. Does this flow better?'"
      - recursive_asking_pattern: "Ask → Implement → Ask for confirmation → Iterate"
      - help_with_outline: "Asks for help with planning BEFORE drafting (highest metacognitive indicator)"
    srl_interpretation: "Strong evidence of advanced self-regulated learning: metacognitive monitoring + strategic help-seeking + perseverance"
    pedagogical_response: "Praise and reinforce this pattern; provide advanced challenge"
    bayesian_evidence_weight: 0.85  # Strong evidence of Self-Regulated Revision competence
    feedback_variant: "help_seeking_adaptive_praise"

# ============================================================================
# SECONDARY CLASSIFICATION: HELP-SEEKING CONTENT CATEGORIES
# What the student asks help about (links to writing competencies)
# ============================================================================

help_seeking_content:
  
  planning_help:
    code: "HC_PLAN"
    content: "Student asks help with planning, outlining, or task interpretation"
    competency_link: "Argument Structure Competence"
    example: "I'm not sure how to organize my paragraph. Should I put the example first or the explanation?"
    srl_phase: "Forethought"
  
  argumentation_help:
    code: "HC_ARG"
    content: "Student asks help with developing argument, evidence, or claim-evidence connection"
    competency_link: "Argument Structure Competence"
    example: "My evidence doesn't feel like it proves my point. How do I make the connection clearer?"
    srl_phase: "Performance/Self-Monitoring"
  
  cohesion_help:
    code: "HC_COH"
    content: "Student asks help with transitions, flow, organization between sentences"
    competency_link: "Cohesion & Coherence Competence"
    example: "These two sentences feel disconnected. What transition word would work best?"
    srl_phase: "Performance/Self-Monitoring"
  
  grammar_help:
    code: "HC_GRAM"
    content: "Student asks help with grammatical corrections or rules"
    competency_link: "Linguistic Complexity"
    example: "Is this tense correct? It doesn't sound right to me."
    srl_phase: "Performance/Self-Monitoring"
  
  vocabulary_help:
    code: "HC_VOC"
    content: "Student asks help with word choice, precision, academic language"
    competency_link: "Linguistic Complexity"
    example: "How can I say 'good' in a more academic way?"
    srl_phase: "Performance/Self-Monitoring"
  
  rubric_help:
    code: "HC_RUB"
    content: "Student asks for clarification on rubric criteria or expectations"
    competency_link: "Metacognitive/Awareness"
    example: "What does 'coherence' mean? How is it different from organization?"
    srl_phase: "Forethought/Understanding"
  
  example_help:
    code: "HC_EX"
    content: "Student requests model examples or worked demonstrations"
    competency_link: "Multiple (learning resource strategy)"
    example: "Could you show me an example of strong argument development?"
    srl_phase: "Forethought/Resource-Seeking"
  
  revision_help:
    code: "HC_REV"
    content: "Student asks how to revise or what to focus revision on"
    competency_link: "Self-Regulated Revision Competence"
    example: "I revised my paragraph, but I'm not sure if it's better. What should I change next?"
    srl_phase: "Self-Reflection"
  
  feedback_clarification:
    code: "HC_FEEDBACK"
    content: "Student asks for clarification on feedback received"
    competency_link: "Feedback Literacy/SRL"
    example: "You said my organization is weak. What specifically should I reorganize?"
    srl_phase: "Self-Reflection"

# ============================================================================
# TERTIARY CLASSIFICATION: HELP-SEEKING TIMING
# When help is sought relative to task milestones
# ============================================================================

help_seeking_timing:
  
  pre_draft:
    code: "HT_PRE"
    description: "Help-seeking BEFORE drafting (asking about planning, rubric, structure)"
    metacognitive_indicator: "Very High – Student plans before executing"
    priority: "HIGH (intervene with planning guidance)"
    example: "Before I start, can I ask about outlining?"
  
  during_draft:
    code: "HT_DUR"
    description: "Help-seeking DURING drafting (asking while actively writing)"
    metacognitive_indicator: "High – Real-time monitoring and strategy adjustment"
    priority: "MEDIUM (provide targeted hint, not full solution)"
    example: "I'm writing now. Is my first sentence clear enough?"
  
  post_draft_prepublish:
    code: "HT_POST_PRE"
    description: "Help-seeking AFTER draft but BEFORE submission (final check, last-minute help)"
    metacognitive_indicator: "Moderate – Checking but late in process"
    priority: "MEDIUM (teach earlier intervention)"
    example: "Before I submit, is this grammar correct?"
  
  post_submission:
    code: "HT_POST_SUB"
    description: "Help-seeking AFTER submission when cannot revise or resubmit"
    metacognitive_indicator: "Low – Reactive rather than proactive"
    priority: "LOW (feedback for next assignment)"
    example: "I already submitted, but what should I have done differently?"

# ============================================================================
# CODING PROCEDURE: HOW TO CODE HELP-SEEKING MESSAGES
# ============================================================================

coding_procedure:
  
  step_1_identify_message:
    instruction: "Identify student message or behavior that involves help-seeking"
    examples:
      - "Student posts message in Moodle forum asking question"
      - "Student raises hand during class and asks question"
      - "Student email: 'Can you help me with...?'"
      - "Student in conference: 'I don't understand...'"
  
  step_2_classify_level:
    instruction: "Classify as Level 1 (None), Level 2 (Present), or Level 3 (Adaptive)"
    questions:
      - "Is help explicitly requested?"
      - "If yes: Is the request specific and targeted?"
      - "If yes: Did student attempt task first or ask early in process?"
    example_coding:
      example_1: "Q: 'How do I make this better?' → Level 2 (Present, vague)"
      example_2: "Q: 'My argument in sentence 3 feels underdeveloped. How do I add evidence?' → Level 3 (Adaptive, specific)"
      example_3: "No question; just works independently → Level 1 (None)"
  
  step_3_classify_content:
    instruction: "Classify WHAT the student is asking help about"
    example: "Help-seeking about argumentation → HC_ARG"
  
  step_4_classify_timing:
    instruction: "Classify WHEN the help was sought"
    example: "Asked before draft → HT_PRE (very high metacognitive indicator)"
  
  step_5_record_data:
    instruction: "Record in database: HS_Level + Content + Timing + Full message text"
    database_fields:
      - student_id
      - task_id
      - draft_number
      - timestamp
      - help_seeking_level: "HS_NONE | HS_PRESENT | HS_ADAPTIVE"
      - help_content_code: "HC_PLAN | HC_ARG | HC_COH | HC_GRAM | ..."
      - help_timing_code: "HT_PRE | HT_DUR | HT_POST_PRE | HT_POST_SUB"
      - message_text: "[Full text of question or request]"
      - teacher_response: "[What teacher did in response]"
      - student_implementation: "[Did student use help? How?]"

# ============================================================================
# INTEGRATION WITH BAYESIAN MODEL
# How help-seeking evidence enters the latent competence inference
# ============================================================================

bayesian_integration:
  
  model_component: "Self-Regulated Revision Competence"
  description: "Help-seeking frequency and quality are observable evidence for SRL competence"
  
  evidence_mapping:
    helps_seeking_frequency:
      observable: "Number of help-seeking messages per assignment (0-5+)"
      threshold_low: 0  # No help-seeking at all
      threshold_moderate: 2  # 2-3 help-seeking instances
      threshold_high: 4  # 4+ help-seeking instances
      probability_given: "If student has 4+ adaptive help-seeking messages → P(SRL_High) increases from 0.5 to 0.75"
    
    help_seeking_quality:
      observable: "Classification as Level 1, 2, or 3"
      level_1_impact: "HS_NONE: P(SRL) stays neutral at 0.50 (unclear whether independence or lack of monitoring)"
      level_2_impact: "HS_PRESENT: P(SRL) moderate increase to 0.60 (shows monitoring but needs strategy refinement)"
      level_3_impact: "HS_ADAPTIVE: P(SRL) strong increase to 0.80 (clear evidence of advanced SRL)"
    
    help_seeking_timing:
      observable: "When help was sought (pre-draft, during, post but pre-submit, etc.)"
      pre_draft_timings: "Pre-draft help = strongest evidence of metacognition; P(SRL) increases significantly"
      post_submission_timing: "Post-submission help = weaker evidence; P(SRL) increases less"
  
  joint_evidence:
    description: "Combine help-seeking frequency + quality + timing for holistic SRL probability"
    example:
      student_case: "Student X has 4 help-seeking messages, all specific and timely (mostly pre-draft and during)"
      assignment_observation: "Level 3 (Adaptive) + Frequency 4 + Timing pre/during"
      bayesian_update: "P(Self-Regulated Revision = High | these helps-seeking patterns) = 0.82"

# ============================================================================
# HELP-SEEKING FEEDBACK CASCADE
# How help-seeking level determines which feedback template to use
# ============================================================================

feedback_cascade:
  
  if_level_1_none:
    interpretation: "Student is not seeking help (either independent or not monitoring)"
    teacher_action: "Normalize help-seeking; explain it's professional strategy"
    feedback_template: "no_help_seeking_normalization"
    onsite_action: "Ask student: 'Did you understand the task?' to determine reason for no help-seeking"
  
  if_level_2_present_unstructured:
    interpretation: "Student recognizes difficulty but questions aren't specific"
    teacher_action: "Coach on asking targeted questions; model specific question phrasing"
    feedback_template: "help_seeking_present_coaching"
    onsite action: "Guide student to ask 'specific question about specific paragraph section'"
  
  if_level_3_adaptive_strategic:
    interpretation: "Student demonstrates strong metacognitive monitoring and strategic help-seeking"
    teacher_action: "Praise and reinforce; provide advanced challenge"
    feedback_template: "help_seeking_adaptive_praise"
    onsite_action: "Advanced challenge (address counterargument, increase complexity)"

# ============================================================================
# TEACHER CODING WORKFLOW
# Practical process for implementing help-seeking coding in classroom
# ============================================================================

teacher_workflow:
  
  frequency: "Code help-seeking messages within 24 hours of receiving them"
  
  moodle_integration: "When student posts help-seeking message in forum/chat:"
    workflow_steps:
      - "Open message in Moodle"
      - "Read entire conversation for context"
      - "Classify using three dimensions: Level (1/2/3) + Content (HC_*) + Timing (HT_*)"
      - "Record in spreadsheet or database"
      - "Select appropriate feedback template"
      - "Send response using template"
  
  in_class_integration: "During in-class writing sessions:"
    workflow_steps:
      - "Listen for help-seeking (hand-raising, side conversations)"
      - "Note when help is sought, about what topic"
      - "Observe whether student attempted first or asked immediately"
      - "Classify and record (can use shorthand: 'HS_ADAPTIVE / HC_ARG / HT_DUR')"
      - "Provide response verbally"
      - "Note if student implemented suggestion"
  
  post_task_analysis: "After assignment completion:"
    workflow_steps:
      - "Review all help-seeking messages for the assignment"
      - "Summarize: Total HS messages? Distribution of Level 1/2/3?"
      - "Identify patterns: What topics did students ask about most?"
      - "Calculate frequency per student"
      - "Update Bayesian model with help-seeking evidence"
      - "Adjust next assignment's rubric/scaffolding based on patterns"

# ============================================================================
# IMPLEMENTATION IN DATABASE
# Fields to add to student_interactions table
# ============================================================================

database_schema:
  
  table_name: "student_help_seeking_log"
  
  fields:
    - field_id: "help_seeking_id" / primary_key / auto_increment
    - field_id: "student_id" / foreign_key / not_null
    - field_id: "task_id" / foreign_key / not_null
    - field_id: "draft_number" / int / not_null
    - field_id: "timestamp" / datetime / not_null
    - field_id: "help_seeking_level" / enum[HS_NONE, HS_PRESENT, HS_ADAPTIVE] / not_null
    - field_id: "help_content_code" / enum[HC_PLAN, HC_ARG, HC_COH, HC_GRAM, HC_VOC, HC_RUB, HC_EX, HC_REV, HC_FEEDBACK]
    - field_id: "help_timing_code" / enum[HT_PRE, HT_DUR, HT_POST_PRE, HT_POST_SUB]
    - field_id: "message_text" / text / not_null
    - field_id: "teacher_response_template" / varchar / nullable
    - field_id: "student_implementation" / text / nullable
    - field_id: "implementation_success" / enum[yes, partial, no] / nullable
  
  indexes:
    - index_student_task: "(student_id, task_id)"
    - index_level: "(help_seeking_level)"
    - index_content: "(help_content_code)"
    - index_timing: "(help_timing_code)"
  
  queries:
    count_help_seeking_per_student: "SELECT student_id, COUNT(*) as total_hs_messages, help_seeking_level FROM student_help_seeking_log GROUP BY student_id, help_seeking_level"
    adaptive_help_seekers: "SELECT student_id FROM student_help_seeking_log WHERE help_seeking_level = 'HS_ADAPTIVE' GROUP BY student_id HAVING COUNT(*) >= 3"
    help_seeking_by_content: "SELECT help_content_code, COUNT(*) as frequency FROM student_help_seeking_log GROUP BY help_content_code"

