rubric:
  scale: [1, 2, 3, 4, 5]
  criteria:
    - id: task_achievement
      description: "Addresses prompt and sustains argumentative position"
    - id: organization
      description: "Logical sequencing and paragraph structure"
    - id: argumentation
      description: "Claim, evidence, explanation, and reasoning"
    - id: cohesion
      description: "Use of transitions and discourse links"
    - id: lexical_resource
      description: "Range and appropriateness of vocabulary"
    - id: grammar_accuracy
      description: "Accuracy of grammar and syntax"
    - id: academic_style
      description: "Formal register and stance"
    - id: mechanics
      description: "Punctuation, spelling, capitalization"
