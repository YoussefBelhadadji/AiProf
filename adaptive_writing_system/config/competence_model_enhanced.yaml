# WriteLens Enhanced Bayesian Competence Model
# Framework: Evidence-Centered Design + SRL Theory + Help-Seeking Integration
# References: Mislevy (2003), Zimmerman (2000), Newman & Schwager (1995)
# Version: 2.0 – Includes Help-Seeking Evidence

metadata:
  title: "Bayesian Latent Writing Competence Model"
  description: "Probabilistic inference of 4 latent writing competencies from observable evidence"
  version: "2.0"
  implementation: "pgmpy Bayesian Network"
  evidence_layers: 3
  helper_seeking_integration: true
  total_observable_variables: 25

# ============================================================================
# LAYER 1: LATENT COMPETENCIES (what we want to infer, cannot directly observe)
# ============================================================================

latent_competencies:
  
  - competency_id: "argument_structure"
    display_name: "Argument Structure Competence"
    description: "Ability to construct clear claims, integrate evidence, and explain reasoning"
    states: ["Low", "Medium", "High"]
    definition:
      low: "Student writes unsupported claims; evidence, if present, is disconnected from claims"
      medium: "Student states claims with some support; explanations link claim to evidence but incompletely"
      high: "Student presents clear claims with relevant, integrated evidence; reasoning is explicit"
    theoretical_basis: "Toulmin (2003) argument logic; Hyland (2019) academic discourse"
    prior_probability: {"Low": 0.25, "Medium": 0.50, "High": 0.25}  # Default prior before evidence
    srl_phase: "Performance/Self-Monitoring"
  
  - competency_id: "cohesion_competence"
    display_name: "Cohesion & Coherence Competence"
    description: "Ability to organize ideas logically and connect sentences with discourse devices"
    states: ["Low", "Medium", "High"]
    definition:
      low: "Ideas are jumbled; sentences feel disconnected; no apparent logical progression"
      medium: "Ideas organized with basic structure; some transitions present but inconsistent"
      high: "Clear logical progression; effective transitions; reader can follow without confusion"
    theoretical_basis: "Halliday & Hasan (1976) cohesion theory; M.A.K. Halliday discourse semantics"
    prior_probability: {"Low": 0.25, "Medium": 0.50, "High": 0.25}
    srl_phase: "Performance/Self-Monitoring"
  
  - competency_id: "linguistic_complexity"
    display_name: "Linguistic Control & Complexity"
    description: "Ability to use grammatically correct, varied, and academically appropriate language"
    states: ["Low", "Medium", "High"]
    definition:
      low: "Frequent grammatical errors; limited vocabulary; simple sentence structures dominate"
      medium: "Mostly grammatical accuracy; vocabulary appropriate but not sophisticated; some variation"
      high: "Grammatical accuracy; sophisticated academic vocabulary; varied sentence structures"
    theoretical_basis: "Crossley & McNamara (2012) computational analysis; Hyland (2019) academic register"
    prior_probability: {"Low": 0.25, "Medium": 0.50, "High": 0.25}
    srl_phase: "Performance/Execution"
  
  - competency_id: "self_regulated_revision"
    display_name: "Self-Regulated Revision & Monitoring"
    description: "Ability to monitor writing quality, seek help strategically, and revise substantively"
    states: ["Low", "Medium", "High"]
    definition:
      low: "No revision attempt; no strategic help-seeking; surface-level engagement with feedback"
      medium: "Limited revision; some help-seeking present but vague; partial engagement with feedback"
      high: "Multiple substantial revisions; strategic, targeted help-seeking; active feedback integration"
    theoretical_basis: "Zimmerman (2000) SRL phases; Newman & Schwager (1995) help-seeking as SRL"
    prior_probability: {"Low": 0.30, "Medium": 0.50, "High": 0.20}  # SRL less common in novices
    srl_phase: "Self-Reflection & Monitoring"

# ============================================================================
# LAYER 2: OBSERVABLE EVIDENCE (measurable indicators of latent competencies)
# ============================================================================

observable_evidence:
  
  # == PRODUCT INDICATORS (final writing quality) ==
  product_indicators:
    
    - variable_id: "rubric_argument_score"
      display_name: "Rubric Argument Score"
      unit: "1-5 scale"
      parents_node: ["argument_structure"]  # Links to this latent variable
      data_source: "Teacher rubric scoring"
      states: [1, 2, 3, 4, 5]
      likelihood_table:
        # P(rubric_argument_score | argument_structure state)
        # if argument_structure = Low, then P(score=1 or 2) is high
        conditional_probabilities: {
          "Low": {1: 0.40, 2: 0.40, 3: 0.15, 4: 0.04, 5: 0.01},
          "Medium": {1: 0.05, 2: 0.15, 3: 0.50, 4: 0.25, 5: 0.05},
          "High": {1: 0.00, 2: 0.02, 3: 0.15, 4: 0.45, 5: 0.38}
        }
    
    - variable_id: "rubric_organization_score"
      display_name: "Rubric Organization Score"
      unit: "1-5 scale"
      parents_node: ["cohesion_competence"]
      data_source: "Teacher rubric scoring"
      states: [1, 2, 3, 4, 5]
      likelihood_table:
        conditional_probabilities: {
          "Low": {1: 0.45, 2: 0.38, 3: 0.12, 4: 0.03, 5: 0.02},
          "Medium": {1: 0.05, 2: 0.15, 3: 0.55, 4: 0.20, 5: 0.05},
          "High": {1: 0.01, 2: 0.02, 3: 0.12, 4: 0.50, 5: 0.35}
        }
    
    - variable_id: "rubric_grammar_score"
      display_name: "Rubric Grammar Accuracy Score"
      unit: "1-5 scale"
      parents_node: ["linguistic_complexity"]
      data_source: "Teacher rubric scoring"
      states: [1, 2, 3, 4, 5]
      likelihood_table:
        conditional_probabilities: {
          "Low": {1: 0.50, 2: 0.35, 3: 0.10, 4: 0.04, 5: 0.01},
          "Medium": {1: 0.05, 2: 0.10, 3: 0.60, 4: 0.20, 5: 0.05},
          "High": {1: 0.00, 2: 0.01, 3: 0.10, 4: 0.48, 5: 0.41}
        }
  
  # == TEXTUAL INDICATORS (computational text features) ==
  textual_indicators:
    
    - variable_id: "word_count"
      display_name: "Total Word Count"
      unit: "words"
      parents_node: ["argument_structure"]  # More words often correlate with development
      data_source: "Automated text analysis"
      states: ["Low (<80)", "Medium (80-150)", "High (>150)"]
      likelihood_table:
        conditional_probabilities: {
          "Low": {"Low (<80)": 0.60, "Medium (80-150)": 0.30, "High (>150)": 0.10},
          "Medium": {"Low (<80)": 0.10, "Medium (80-150)": 0.70, "High (>150)": 0.20},
          "High": {"Low (<80)": 0.05, "Medium (80-150)": 0.25, "High (>150)": 0.70}
        }
    
    - variable_id: "error_density"
      display_name: "Grammatical Error Density"
      unit: "errors per 100 words"
      parents_node: ["linguistic_complexity"]
      data_source: "Automated grammar analysis"
      states: ["Low (<3)", "Medium (3-5)", "High (>5)"]
      likelihood_table:
        conditional_probabilities: {
          "Low": {"Low (<3)": 0.15, "Medium (3-5)": 0.25, "High (>5)": 0.60},
          "Medium": {"Low (<3)": 0.45, "Medium (3-5)": 0.40, "High (>5)": 0.15},
          "High": {"Low (<3)": 0.75, "Medium (3-5)": 0.20, "High (>5)": 0.05}
        }
    
    - variable_id: "cohesion_index"
      display_name: "Discourse Connective Frequency"
      unit: "connectives per 100 words"
      parents_node: ["cohesion_competence"]
      data_source: "Automated discourse analysis"
      states: ["Low (<1.5)", "Medium (1.5-3)", "High (>3)"]
      likelihood_table:
        conditional_probabilities: {
          "Low": {"Low (<1.5)": 0.70, "Medium (1.5-3)": 0.20, "High (>3)": 0.10},
          "Medium": {"Low (<1.5)": 0.15, "Medium (1.5-3)": 0.65, "High (>3)": 0.20},
          "High": {"Low (<1.5)": 0.05, "Medium (1.5-3)": 0.25, "High (>3)": 0.70}
        }
    
    - variable_id: "type_token_ratio"
      display_name: "Lexical Diversity (Type-Token Ratio)"
      unit: "unique/total words"
      parents_node: ["linguistic_complexity"]
      data_source: "Automated vocabulary analysis"
      states: ["Low (<0.40)", "Medium (0.40-0.55)", "High (>0.55)"]
      likelihood_table:
        conditional_probabilities: {
          "Low": {"Low (<0.40)": 0.65, "Medium (0.40-0.55)": 0.25, "High (>0.55)": 0.10},
          "Medium": {"Low (<0.40)": 0.15, "Medium (0.40-0.55)": 0.65, "High (>0.55)": 0.20},
          "High": {"Low (<0.40)": 0.05, "Medium (0.40-0.55)": 0.20, "High (>0.55)": 0.75}
        }
  
  # == BEHAVIORAL INDICATORS (SRL process evidence) ==
  behavioral_indicators:
    
    - variable_id: "revision_frequency"
      display_name: "Number of Revision Drafts"
      unit: "count (0, 1, 2, 3+)"
      parents_node: ["self_regulated_revision"]
      data_source: "Moodle submission history"
      states: ["None (0)", "Limited (1)", "Moderate (2)", "Extensive (3+)"]
      likelihood_table:
        conditional_probabilities: {
          "Low": {"None (0)": 0.70, "Limited (1)": 0.20, "Moderate (2)": 0.08, "Extensive (3+)": 0.02},
          "Medium": {"None (0)": 0.10, "Limited (1)": 0.50, "Moderate (2)": 0.30, "Extensive (3+)": 0.10},
          "High": {"None (0)": 0.02, "Limited (1)": 0.08, "Moderate (2)": 0.35, "Extensive (3+)": 0.55}
        }
    
    - variable_id: "feedback_engagement_score"
      display_name: "Feedback View Frequency"
      unit: "number of times viewed feedback"
      parents_node: ["self_regulated_revision"]
      data_source: "Moodle analytics"
      states: ["None (0)", "Once (1)", "Multiple (2+)"]
      likelihood_table:
        conditional_probabilities: {
          "Low": {"None (0)": 0.60, "Once (1)": 0.25, "Multiple (2+)": 0.15},
          "Medium": {"None (0)": 0.15, "Once (1)": 0.40, "Multiple (2+)": 0.45},
          "High": {"None (0)": 0.05, "Once (1)": 0.15, "Multiple (2+)": 0.80}
        }
    
    - variable_id: "time_on_task"
      display_name: "Time Spent on Task (minutes)"
      unit: "minutes"
      parents_node: ["self_regulated_revision"]
      data_source: "Moodle time-tracking / teacher observation"
      states: ["Low (<15)", "Moderate (15-40)", "High (>40)"]
      likelihood_table:
        conditional_probabilities: {
          "Low": {"Low (<15)": 0.70, "Moderate (15-40)": 0.20, "High (>40)": 0.10},
          "Medium": {"Low (<15)": 0.15, "Moderate (15-40)": 0.65, "High (>40)": 0.20},
          "High": {"Low (<15)": 0.05, "Moderate (15-40)": 0.30, "High (>40)": 0.65}
        }
  
  # == HELP-SEEKING INDICATORS (NEW – critical for SRL) ==
  help_seeking_indicators:
    
    - variable_id: "help_seeking_level"
      display_name: "Help-Seeking Behavior Level"
      unit: "categorical (None, Present, Adaptive)"
      parents_node: ["self_regulated_revision"]
      data_source: "Help-seeking coding scheme (Newman & Schwager 1995)"
      states: ["None", "Present (Unstructured)", "Adaptive (Strategic)"]
      theoretical_basis: "Help-seeking is evidence of metacognitive monitoring (Zimmerman 2000)"
      likelihood_table:
        # P(help_seeking_level | self_regulated_revision state)
        conditional_probabilities: {
          "Low": {
            "None": 0.55,
            "Present (Unstructured)": 0.35,
            "Adaptive (Strategic)": 0.10
          },
          "Medium": {
            "None": 0.15,
            "Present (Unstructured)": 0.55,
            "Adaptive (Strategic)": 0.30
          },
          "High": {
            "None": 0.05,
            "Present (Unstructured)": 0.15,
            "Adaptive (Strategic)": 0.80  # Strong SRL indicator
          }
        }
    
    - variable_id: "help_seeking_frequency"
      display_name: "Number of Help-Seeking Messages"
      unit: "count"
      parents_node: ["self_regulated_revision"]
      data_source: "Help-seeking log from Moodle or in-class observation"
      states: ["None (0)", "Few (1-2)", "Several (3-4)", "Many (5+)"]
      likelihood_table:
        conditional_probabilities: {
          "Low": {"None (0)": 0.60, "Few (1-2)": 0.25, "Several (3-4)": 0.12, "Many (5+)": 0.03},
          "Medium": {"None (0)": 0.15, "Few (1-2)": 0.40, "Several (3-4)": 0.35, "Many (5+)": 0.10},
          "High": {"None (0)": 0.05, "Few (1-2)": 0.10, "Several (3-4)": 0.30, "Many (5+)": 0.55}
        }

# ============================================================================
# LAYER 3: NETWORK STRUCTURE & INFERENCE
# ============================================================================

network_structure:
  description: "Directed acyclic graph (DAG) showing causal relationships"
  nodes:
    - type: "latent"
      nodes: ["argument_structure", "cohesion_competence", "linguistic_complexity", "self_regulated_revision"]
    - type: "observable"
      nodes: ["rubric_argument_score", "rubric_organization_score", "rubric_grammar_score",
              "word_count", "error_density", "cohesion_index", "type_token_ratio",
              "revision_frequency", "feedback_engagement_score", "time_on_task",
              "help_seeking_level", "help_seeking_frequency"]
  
  edges:
    - from: "argument_structure"
      to: ["rubric_argument_score", "word_count"]
    - from: "cohesion_competence"
      to: ["rubric_organization_score", "cohesion_index"]
    - from: "linguistic_complexity"
      to: ["rubric_grammar_score", "error_density", "type_token_ratio"]
    - from: "self_regulated_revision"
      to: ["revision_frequency", "feedback_engagement_score", "time_on_task", "help_seeking_level", "help_seeking_frequency"]

# ============================================================================
# INFERENCE ALGORITHM
# How to compute posteriors P(Competency | all evidence observed)
# ============================================================================

inference_algorithm:
  framework: "Bayesian Inference (Exact or Approximate)"
  method: "Variable Elimination or Loopy Belief Propagation (pgmpy implementation)"
  
  steps:
    step_1_initialize_priors: "Set P(each latent node) = prior probability"
    step_2_observe_evidence: "Set observed variables = actual student values from data"
    step_3_compute_posteriors: "Propagate evidence backward through network to infer latent competencies"
    step_4_normalize: "Ensure P(state_1) + P(state_2) + P(state_3) = 1.0"
  
  example_inference:
    student_observations:
      rubric_argument_score: 2  # Low score on argument rubric
      revision_frequency: "Extensive (3+)"  # But lots of revisions
      help_seeking_level: "Adaptive (Strategic)"  # And strategic help-seeking
      time_on_task: "High (>40)"
    
    inference_result:
      argument_structure_posterior: {"Low": 0.65, "Medium": 0.30, "High": 0.05}  # Low argument ability
      self_regulated_revision_posterior: {"Low": 0.05, "Medium": 0.20, "High": 0.75}  # High SRL!
      
    interpretation: "Student shows LOW argument competence but HIGH revision competence. Discrepancy suggests student is trying hard but may lack strategic argument knowledge. Intervention: teach argument structure explicitly, praising the SRL effort."

# ============================================================================
# APPLICATION WORKFLOW
# How teachers use Bayesian posteriors for adaptive feedback
# ============================================================================

application_workflow:
  
  use_case_1_learner_profiling:
    input: "Student's observable evidence (scores, behavior, help-seeking)"
    process: "Run Bayesian inference"
    output: "Posterior probabilities for each competency"
    action: "Classify student into learner profile based on competency constellation"
    example:
      lowering_example:
        arg_post: "High"
        cohesion_post: "High"
        ling: "Medium"
        srl_post: "High"
        profile: "Strategic & Engaged"
        action: "Provide advanced challenge"
  
  use_case_2_targeted_feedback:
    input: "Which competency has the lowest posterior probability?"
    process: "Identify competency needing most support"
    output: "Feedback rule targeting that competency"
    action: "Adapt feedback specificity and cognitive demand"
    example:
      example_scenario:
        cohesion_posterior: {"Low": 0.70, "Medium": 0.25, "High": 0.05}
        action: "Send discourse organization feedback; teach transitions"
  
  use_case_3_progress_tracking:
    input: "Posterior probabilities after each assignment"
    process: "Compare posteriors across time"
    output: "Trends in competency development"
    action: "Celebrate improvements; intensify support where stalled"
    example:
      tracking_example:
        assignment_1_srl_posterior: {"High": 0.30}
        assignment_2_srl_posterior: {"High": 0.65}  # Improvement!
        action: "Celebrate: 'See how your revision effort is paying off!'"

# ============================================================================
# CONFIGURATION FOR PGMPY IMPLEMENTATION
# ============================================================================

pgmpy_config:
  library: "pgmpy"
  model_type: "BayesianNetwork"
  
  nodes_definition:
    - name: "argument_structure"
      cardinality: 3  # Low, Medium, High
      states: ["Low", "Medium", "High"]
    
    - name: "rubric_argument_score"
      cardinality: 5  # Scores 1-5
      states: [1, 2, 3, 4, 5]
      parents: ["argument_structure"]
  
  cpd_example: |
    # Code example for defining Conditional Probability Distribution
    # from pgmpy.estimators import MaximumLikelihoodEstimator
    # cpd_arg = TabularCPD('argument_structure', 3, [[0.25], [0.50], [0.25]])
    # cpd_score = TabularCPD('rubric_argument_score', 5,
    #   [[0.40, 0.05, 0.00],  # P(score=1 | low/med/high arg)
    #    [0.40, 0.15, 0.02],  # P(score=2 | low/med/high arg)
    #    [0.15, 0.50, 0.15],  # P(score=3 | low/med/high arg)
    #    [0.04, 0.25, 0.45],  # P(score=4 | low/med/high arg)
    #    [0.01, 0.05, 0.38]], # P(score=5 | low/med/high arg)
    #  evidence=['argument_structure'], evidence_card=[3])

# ============================================================================
# EXTENSIONS & FUTURE ENHANCEMENTS
# ============================================================================

extensions:
  
  extension_1_domain_specific_bayes:
    description: "Condition priors on learner demographics (L2 learner, major, etc.)"
    implementation: "Separate Bayesian models for different learner populations"
  
  extension_2_dynamic_bayesian_network:
    description: "Extend to time-series: track competency development across full semester"
    implementation: "Add temporal links; model competencies as evolving over time"
  
  extension_3_causal_inference:
    description: "Use Bayesian network for causal questions: 'What if we intensify help-seeking coaching?'"
    implementation: "Add intervention nodes; compute causal effects via do-calculus"
