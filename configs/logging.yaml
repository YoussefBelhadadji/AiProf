# Logging Configuration
# ====================
# 
# Centralized logging settings for the entire system

logging:
  # Log Level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: INFO
  
  # Log Files Location: logs/ folder at project root
  logs_directory: ../logs
  
  # Individual Log Files
  files:
    pipeline:
      name: pipeline.log        # Pipeline execution logs
      level: INFO
      retention_days: 30        # Keep for 30 days
    
    errors:
      name: errors.log          # Error and exception logs
      level: ERROR
      retention_days: 90        # Keep for 90 days
    
    decisions:
      name: decisions.log       # AI decision logs (crucial!)
      level: INFO
      retention_days: 365       # Keep for 1 year (compliance)
    
    general:
      name: general.log         # Everything else
      level: DEBUG
      retention_days: 30
  
  # Format
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  
  # Console Output
  console:
    enabled: true
    level: INFO                 # Only INFO and above to console
  
  # File Output
  file:
    enabled: true
    level: DEBUG                # All levels to files

